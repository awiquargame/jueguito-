name: Build & Sign Release AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp shop.css www/
          cp -r assets www/
          cp -r src www/

      - name: Generate App Icons
        run: |
          npm install -D @capacitor/assets
          npx capacitor-assets generate --android

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Release Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign & Optimize AAB
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        if: env.SIGNING_KEY != null
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: dashing-into-neo-release
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload Debug APK (Optional)
        uses: actions/upload-artifact@v4
        with:
          name: dashing-into-neo-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
